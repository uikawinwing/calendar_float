    摘要: 一篇赛瑞利亚课堂与家庭晚灯旁的灯海夜童话；老师在除夕前带孩子们制作水母灯，借孩子的提问讲起海底古神的噩梦、黑紫泡泡带来的灾厄，以及瑟涟·赛瑞利亚用幻光水母天穹庇护众生、以摇篮曲安抚深海的传说；故事强调灯海夜的意义并非驱赶恐惧，而是向瑟涟道谢，并告诉海底沉睡者：上面仍有光，大家都在陪它做美梦
