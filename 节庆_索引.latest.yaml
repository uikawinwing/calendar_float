  - id: 阿芙罗黛蒂之冠
    书名: 阿芙罗黛蒂之冠
    关联事件:
      - goddess_beauty_contest
    摘要: 倾国倾城祭最初只是索伦蒂斯商人仿照赛马盘口举办的金冠淑女赛，参赛者被写成赔率卡，阿芙罗黛蒂之名也被当成赌桌招牌；安娜斯塔西娅认为这是对“阿芙罗黛蒂”一词的亵慢，连续五年报名并夺冠，压垮冠军赌局，却让观众逐渐从押注转向真正观看美与舞台；第六年商人以【至高的阿芙罗黛蒂】之名将她移出常规赛，试图恢复盘口，引发民众冲入蓝珀商馆的骚乱；事后安娜斯塔西娅收购赛事，将其改造为面向全大陆的倾国倾城祭，并以最高评审身份坐镇海姬广场决赛
    全文:
      条目名: "[节庆_倾国倾城祭_文本_阿芙罗黛蒂之冠]"
