版本: v4.2(0518)
默认设置:
  mvu时间路径: stat_data.世界.时间
  mvu地点路径: stat_data.世界.地点
  书籍全文默认关键词模板: ${bookname}
提醒默认值:
  注入方式: silent_scan
  注入深度: 0
  禁用递归: true
  禁用触发词: true
  宏触发词模板: "[[_${id}_reminder_]]"
  缺省模板:
    未开始: ${节庆名} 将在 ${剩余天数} 天后开始，看${节庆名}的文本并在描写四周备节的情况
    进行中: ${节庆名} 正在举行，看${节庆名}的文本并在描写四周过節的情况
书籍默认值:
  摘要注入方式: injectprompt
  摘要注入深度: 4
